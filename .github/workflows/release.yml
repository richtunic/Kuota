name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-22.04
    outputs:
      release_body: ${{ steps.release-notes.outputs.release_body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        shell: bash
        run: |
          current_ref="${GITHUB_REF_NAME}"
          notes_file="${RUNNER_TEMP}/release-notes.md"

          {
            echo "## Kuota ${current_ref}"
            echo
            echo "### Cambios"
          } > "${notes_file}"

          explicit_notes="docs/releases/${current_ref}.md"
          if [[ -f "${explicit_notes}" ]]; then
            cat "${explicit_notes}" > "${notes_file}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            previous_tag="$(git describe --tags --abbrev=0 "${current_ref}^" 2>/dev/null || true)"
            if [[ -n "${previous_tag}" ]]; then
              git log --pretty=format:'- %s (%h)' "${previous_tag}..${current_ref}" >> "${notes_file}"
            else
              git log --pretty=format:'- %s (%h)' "${current_ref}" >> "${notes_file}"
            fi
          else
            echo "- Build manual desde ${current_ref}." >> "${notes_file}"
          fi

          if [[ ! -f "${explicit_notes}" ]]; then
            {
              echo
              echo "### Assets"
              echo "- Builds firmados para macOS y Windows."
              echo "- Incluye latest.json para el actualizador automatico."
            } >> "${notes_file}"
          fi

          {
            echo "release_body<<EOF"
            cat "${notes_file}"
            echo
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Keep main on latest released code
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          git merge --ff-only "${GITHUB_REF_NAME}"
          git push origin HEAD:main

  release:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Kuota ${{ github.ref_name }}"
          releaseBody: ${{ needs.prepare-release.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
